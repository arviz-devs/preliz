name: Run tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
  pull_request:
    paths-ignore:
      - "docs/**"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    name: Set up Python ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: conda-incubator/setup-miniconda@v3
        with:
          channels: conda-forge, defaults
          channel-priority: true
          python-version: ${{ matrix.python-version }}
          auto-update-conda: true

      - name: Cache PyTensor NUMBA compilation artifacts
        uses: actions/cache@v4
        with:
          path: ~/.pytensor/numba/
          key: pytensor-numba-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('requirements-dev.txt', 'pyproject.toml') }}
          restore-keys: |
            pytensor-numba-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install preliz
        shell: bash -l {0}
        run: |
          conda install pip
          pip install -r requirements-dev.txt
          pip install ".[full]"
          python --version
          conda list
          pip freeze
      - name: Run linters
        shell: bash -l {0}
        run: |
          echo "Checking code style with ruff..."
          ruff check preliz/
      - name: Run tests
        shell: bash -l {0}
        run: |
          python -m pytest -vv --cov=preliz --cov-report=term --cov-report=xml preliz/tests
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          env_vars: OS,PYTHON
          name: codecov-umbrella
          fail_ci_if_error: false
